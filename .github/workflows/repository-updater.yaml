---
name: Repository Updater

# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types: ["update"]

permissions:
  contents: write

jobs:
  update:
    name: 🔄 Update add-on version
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code
        uses: actions/checkout@v5

      - name: 📝 Update config.yaml version
        run: |
          ADDON="${{ github.event.client_payload.addon }}"
          VERSION="${{ github.event.client_payload.version }}"
          CONFIG="${ADDON}/config.yaml"

          if [ -f "$CONFIG" ]; then
            sed -i "s/^version:.*/version: ${VERSION}/" "$CONFIG"
            echo "Updated ${CONFIG} to version ${VERSION}"
          else
            echo "::error::Config not found: ${CONFIG}"
            exit 1
          fi

      - name: 📝 Update CHANGELOG.md
        run: |
          ADDON="${{ github.event.client_payload.addon }}"
          VERSION="${{ github.event.client_payload.version }}"
          REPO="${{ github.event.client_payload.repository }}"
          CHANGELOG="${ADDON}/CHANGELOG.md"

          if [ -f "$CHANGELOG" ]; then
            NOTES=$(gh api "repos/${REPO}/releases/tags/v${VERSION}" --jq '.body // empty' 2>/dev/null || true)

            if [ -n "$NOTES" ]; then
              ENTRY="## ${VERSION}"$'\n\n'"${NOTES}"
            else
              ENTRY="## ${VERSION}"$'\n\n'"- See [release notes](https://github.com/${REPO}/releases/tag/v${VERSION})"
            fi

            # Prepend new entry after the header line
            head -1 "$CHANGELOG" > "${CHANGELOG}.tmp"
            echo "" >> "${CHANGELOG}.tmp"
            echo "$ENTRY" >> "${CHANGELOG}.tmp"
            tail -n +2 "$CHANGELOG" >> "${CHANGELOG}.tmp"
            mv "${CHANGELOG}.tmp" "$CHANGELOG"

            echo "Updated ${CHANGELOG} with version ${VERSION}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 📤 Commit and push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "⬆️ Update ${{ github.event.client_payload.addon }} to ${{ github.event.client_payload.version }}"
